name: Pipeline CI/CD BibOps

# S'active à chaque push ou pull request sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installe Python sur le serveur GitHub
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Installe les bibliothèques
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lance les tests
      - name: Exécution des tests avec Pytest
        env:
          PYTHONPATH: .
        run: |
          pytest tests/